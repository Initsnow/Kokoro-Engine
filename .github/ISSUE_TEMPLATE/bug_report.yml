name: Bug Report / Bug 报告
description: Report a bug or unexpected behavior / 报告 Bug 或异常行为
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! / 感谢你花时间报告 Bug！
  - type: textarea
    id: description
    attributes:
      label: Describe the bug / 描述 Bug
      description: A clear description of what the bug is. / 清晰描述 Bug 是什么。
      placeholder: When I click the mic button, nothing happens...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      description: How can we reproduce this issue? / 如何复现此问题？
      placeholder: |
        1. Open Settings
        2. Enable STT
        3. Click mic button
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 期望行为
      description: What did you expect to happen? / 你期望发生什么？
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / 截图
      description: If applicable, add screenshots. / 如有需要，请添加截图。
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: OS / 操作系统
      placeholder: Windows 11 / macOS 14 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kokoro Engine version / 版本
      placeholder: v0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / 日志
      description: Paste any relevant logs from DevTools console or Tauri backend.
      render: shell
    validations:
      required: false
