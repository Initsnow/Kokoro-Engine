name: Build Windows

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Windows app (x86_64)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc --bundles nsis

      - name: List bundle output
        run: |
          Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" -Recurse -File | ForEach-Object { $_.FullName }

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kokoro-Engine-windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Rename files for release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $nsis_dir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          Get-ChildItem -Path $nsis_dir -Filter "*.exe" | ForEach-Object {
            $new_name = $_.Name -replace '\.exe$', '-windows.exe'
            Rename-Item -Path $_.FullName -NewName $new_name
          }

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
